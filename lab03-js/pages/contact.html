<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Сторінка контактів з формою зворотного зв'язку.">
    <title>Мій перший HTML-сайт - Контакти</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/responsive.css">
    <script src="../js/main.js" defer></script>
</head>
<body>
    <header class="site-header">
        <nav class="site-nav container">
            <button class="menu-toggle" id="menu-toggle" aria-expanded="false" aria-label="Відкрити меню">
                <span class="hamburger"></span>
            </button>
            <ul class="nav-list" id="nav-list">
                <li><a href="../index.html">Головна</a></li>
                <li><a href="about.html">Про мене</a></li>
                <li><a href="contact.html" class="active">Контакти</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1>Зв'яжіться зі мною</h1>
        <p>Маєте запитання чи пропозиції? Будь ласка, заповніть форму нижче.</p>

        <section class="card">
            <form action="#" method="get" class="contact-form">
                <h2>Форма зворотного зв'язку</h2>

                <div class="form-group">
                    <label for="name">Ім’я (обов’язково):</label>
                    <input id="name" name="name" type="text" required minlength="2" maxlength="30" placeholder="Введіть ваше ім'я">
                </div>

                <div class="form-group">
                    <label for="email">Email (обов’язково):</label>
                    <input id="email" name="email" type="email" required placeholder="example@mail.com">
                </div>

                <div class="form-group">
                    <label for="phone">Телефон (необов'язково):</label>
                    <input id="phone" name="phone" type="tel" pattern="[0-9]{10}" placeholder="0991234567">
                </div>

                <div class="form-group">
                    <label for="topic">Тема звернення:</label>
                    <select id="topic" name="topic">
                        <option value="study">Навчання</option>
                        <option value="collaboration">Співпраця</option>
                        <option value="feedback">Відгук</option>
                        <option value="other">Інше</option>
                    </select>
                </div>

                <fieldset class="form-group">
                    <legend>Зручний спосіб зв’язку</legend>
                    <label class="radio-label">
                        <input type="radio" name="contactWay" value="email" checked> Email
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="contactWay" value="phone"> Телефон
                    </label>
                </fieldset>

                <div class="form-group">
                    <label for="message">Ваше повідомлення:</label>
                    <textarea id="message" name="message" rows="6" placeholder="Напишіть ваше повідомлення тут..."></textarea>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" name="agree" required>
                        Я погоджуюсь з обробкою персональних даних (обов'язково)
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Надіслати повідомлення</button>
                    <button type="reset" class="btn btn-secondary">Очистити форму</button>
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Студент Максим. Всі права захищені.</p>
            <button id="bonus-btn">Натисни мене (JS Bonus)</button>
        </div>
    </footer>
</body>
</html>
