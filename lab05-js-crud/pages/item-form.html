<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма курсу</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="../index.html">Головна</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="item-form.html" class="active" id="nav-form-link">Додати курс</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 id="form-title">Додати новий курс</h1>
        
        <form id="item-form" class="item-form">
            <input type="hidden" id="item-id" name="id">
            
            <div class="form-group">
                <label for="title">Назва курсу:</label>
                <input type="text" id="title" name="title" required minlength="3">
                <span class="error-message" id="error-title"></span>
            </div>

            <div class="form-group">
                <label for="category">Категорія:</label>
                <select id="category" name="category" required>
                    <option value="">Оберіть категорію</option>
                    <option value="Frontend">Frontend</option>
                    <option value="Backend">Backend</option>
                    <option value="Programming">Programming</option>
                    <option value="Design">Design</option>
                    <option value="Performance">Performance</option>
                </select>
                <span class="error-message" id="error-category"></span>
            </div>

            <div class="form-group">
                <label for="price">Ціна ($):</label>
                <input type="number" id="price" name="price" step="0.01" min="0" required>
                <span class="error-message" id="error-price"></span>
            </div>

            <div class="form-group">
                <label for="rating">Рейтинг (0-5):</label>
                <input type="number" id="rating" name="rating" step="0.1" min="0" max="5" required>
                <span class="error-message" id="error-rating"></span>
            </div>

            <div class="form-group">
                <label for="level">Рівень:</label>
                <select id="level" name="level" required>
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                </select>
            </div>

            <div class="form-group">
                <label for="description">Опис:</label>
                <textarea id="description" name="description" rows="4" required></textarea>
                <span class="error-message" id="error-description"></span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="submit-btn">Зберегти</button>
                <button type="button" class="btn" id="cancel-btn">Скасувати</button>
            </div>
        </form>

        <div id="form-status" class="status-message"></div>
    </main>

    <footer>
        <p>&copy; 2026 Університетський курс фронтенду</p>
    </footer>

    <script src="../js/main.js" type="module"></script>
</body>
</html>
